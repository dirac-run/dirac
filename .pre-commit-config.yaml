# prek configuration - mirrors the original lint-staged setup
# See package.json lint-staged for reference

repos:
  # When state-keys.ts changes, regenerate the proto and stage it
  - repo: local
    hooks:
      - id: generate-state-proto
        name: Generate state proto
        language: system
        entry: bash -c 'node scripts/generate-state-proto.mjs && git add proto/dirac/state.proto'
        files: src/shared/storage/state-keys.ts
        pass_filenames: false

  # Biome check on all staged files
  - repo: local
    hooks:
      - id: biome-check
        name: Biome check staged files
        language: system
        entry: biome check --write --staged --no-errors-on-unmatched --files-ignore-unknown=true
        types: [file]
